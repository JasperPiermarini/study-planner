<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <h1 class="app-title">Study<span class="accent">Planner</span></h1>
    <nav class="tabs">
      <a href="#today" class="tab" data-tab="today">Today</a>
      <a href="#plans" class="tab" data-tab="plans">Plans</a>
    </nav>
  </header>

  <main id="view" class="view"></main>

  <div id="setup-notice" class="setup-notice hidden">
    <h2>Almost there</h2>
    <p>
      This app needs a Firebase project to sync your plans across devices.
      Open <code>firebase-config.js</code> and paste in your Firebase web app
      config. See the README for step-by-step instructions.
    </p>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
